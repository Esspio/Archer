<mat-grid-list cols="6" rowHeight="fit">
  @for (tile of tiles; track tile) {
    <mat-grid-tile [colspan]="tile.cols" [rowspan]="tile.rows" [style.background]="tile.color">
      <ng-container
        [ngComponentOutlet]="tile.component"
        [ngComponentOutletInjector]="criarInjector(tile.gridTitle, tile.gridContent)"
      >
      </ng-container>
    </mat-grid-tile>
  }
</mat-grid-list>
