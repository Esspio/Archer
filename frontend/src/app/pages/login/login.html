<main>
  <div class="login-container">
    <div class="logo">
      <img src="assets/png/archer_logo_horizontal.png" alt="Logo Archer" />
    </div>
    <div class="inputs">
      <app-input
        type="text"
        name="login"
        label="Login"
        placeholder="Insira seu login"
        icon="person"
      >
      </app-input>

      <app-input
        type="password"
        name="password"
        label="Senha"
        placeholder="Insira sua senha"
        icon="lock"
        botaoExibirSenha="'true'"
      >
      </app-input>
    </div>
  </div>
</main>
