<main>
  <mat-drawer-container class="default-template-page">
    <mat-drawer mode="side" opened class="default-template-sidenav-content"
      ><app-sidenav></app-sidenav
    ></mat-drawer>

    <mat-drawer-content class="default-template-page-content">
      <div class="container-boas-vindas">
        <span>{{ pageName() }}</span>
      </div>
      <router-outlet (activate)="onActivate($event)"></router-outlet>
    </mat-drawer-content>
  </mat-drawer-container>
</main>
