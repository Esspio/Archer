<section class="grid-item">
  <div class="grid-item-container">
    <div class="grid-item-title">
      <app-title title="{{ gridTitle() }}" size="normal"></app-title>
    </div>
    <div class="grid-item-content">
      @for (gridContentInput of gridContentInputs(); track gridContentInput) {
        <ng-container
          [ngComponentOutlet]="gridContent()"
          [ngComponentOutletInputs]="gridContentInput"
        ></ng-container>
      }
    </div>
  </div>
</section>
