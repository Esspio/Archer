<section>
  <span class="titulo-grupo">{{ tituloGrupo() }}</span>
  <div class="group-content">
    @for (itemGrupo of itemGrupoList(); track $index) {
      <a href="{{ itemGrupo.linkRef }}">
        <div class="item-content">
          <mat-icon fontIcon="{{ itemGrupo.icon }}"></mat-icon>
          <span>{{ itemGrupo.label }}</span>
        </div>
      </a>
    }
  </div>
  <hr />
</section>
